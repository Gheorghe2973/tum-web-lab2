<section class="hero relative flex items-center h-screen min-h-[600px] overflow-hidden" id="hero">
  {% for slide in site.data.slides %}
  <div class="hero-slide absolute inset-0 flex items-center {% unless forloop.first %}hidden{% endunless %}" data-index="{{ forloop.index0 }}">
    <div class="hero-bg absolute inset-0" style="background:url('{{ slide.image }}') center/cover no-repeat"></div>
    <div class="absolute inset-0" style="background:linear-gradient(to right,rgba(5,15,35,0.75) 40%,rgba(5,15,35,0.1) 100%)"></div>
    <div class="hero-content relative z-10 px-20 max-w-[640px] max-[768px]:px-6">
      <h1 class="font-['Syne'] text-[clamp(2rem,4vw,3.25rem)] font-extrabold text-white leading-[1.15] tracking-tight mb-5">{{ slide.title }}</h1>
      <p class="text-base text-white/80 leading-relaxed mb-9">{{ slide.subtitle }}</p>
      <a class="inline-flex items-center gap-2 px-7 py-3 bg-transparent border border-white/70 text-white text-[0.9rem] font-medium rounded no-underline transition-colors hover:bg-white/15 hover:border-white" href="{{ slide.cta_url }}">
        {{ slide.cta_label }}
        <svg class="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="8" x2="13" y2="8"/><polyline points="9 4 13 8 9 12"/></svg>
      </a>
    </div>
  </div>
  {% endfor %}

  <div class="hero-dots absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-[10px] z-10">
    {% for slide in site.data.slides %}
    <button class="hero-dot w-8 h-[3px] bg-white/35 border-none rounded-sm cursor-pointer transition-colors" data-index="{{ forloop.index0 }}"></button>
    {% endfor %}
  </div>
</section>
