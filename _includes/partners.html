<section class="py-16 bg-[#f4f6fb] border-t border-b border-[#e2e8f4]" id="partners">
  <div class="max-w-[1200px] mx-auto px-10 max-[768px]:px-5">
    <h2 class="font-['Syne'] text-[12px] font-bold tracking-[0.12em] uppercase text-[#6b7a99] text-center mb-10">Trusted by Leading Healthcare Organizations</h2>
    <div class="flex items-center justify-center flex-wrap gap-12">
      {% for partner in site.data.partners %}
      <div class="partner-logo font-['Syne'] text-base font-bold text-[#6b7a99] opacity-50 cursor-default hover:opacity-100">{{ partner.name }}</div>
      {% endfor %}
    </div>
  </div>
</section>
