<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="description" content="Medical equipment solutions" />
  <title>MedCore</title>
  <link rel="stylesheet" href="reset.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<body>

<header class="site-header" id="siteHeader">

  <!-- Top bar -->
  <div class="header-topbar">
    <a href="#">Media Center</a>
    <a href="#contact">Contact Us</a>
    <button class="topbar-region">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="8" cy="8" r="6"/>
        <path d="M8 2c-2 2-3 4-3 6s1 4 3 6M8 2c2 2 3 4 3 6s-1 4-3 6M2 8h12"/>
      </svg>
      Select Region / Language
    </button>
  </div>

  <!-- Main nav -->
  <nav class="navbar">

    <button class="nav-hamburger" id="navHamburger" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <a class="nav-logo" href="#"></a>

    <ul class="nav-links">
      <li class="nav-item">
        <a class="nav-link" href="#products">Products & Solutions</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#services">Services</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#career">Career</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#about">About Us</a>
      </li>
    </ul>

    <div class="nav-actions">
      <div class="nav-search">
        <input class="nav-search-input" type="text" placeholder="Search..." />
        <button class="nav-search-btn" aria-label="Search">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="9" r="6"/>
            <line x1="13.5" y1="13.5" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

  </nav>

  <!-- Mobile menu -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="#products">Products & Solutions</a>
    <a href="#services">Services</a>
    <a href="#career">Career</a>
    <a href="#about">About Us</a>
  </div>

</header>

<section class="hero-placeholder"></section>

<script src="script.js"></script>
